services:
  clickup-mcp-server-http:
    build: .
    container_name: clickup-mcp-server-http
    ports:
      - "8767:8767"
    environment:
      - CLICKUP_API_TOKEN=${CLICKUP_API_TOKEN}
      - MCP_ALLOWED_TOKENS=${MCP_ALLOWED_TOKENS}
    volumes:
      - cloudflared-certs:/root/.cloudflared
      - oauth-state:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "console.log('OK')"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

volumes:
  cloudflared-certs:
  oauth-state:
